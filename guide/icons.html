<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icons</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="./js/clipBoard.js"></script>
  </head>

  <body>
    <h2>Icons</h2>
    <details class="variable">
      <summary>특정 컴포넌트 소속에 따라 디자인이 일부 변형될경우 변수로 제어합니다.</summary>
      <div class="list">
        <div><strong>--icon</strong>아이콘 이미지 경로기본제공</div>
        <div><strong>--size</strong>아이콘 크기</div>
      </div>
    </details>
    <div class="copy-group">
      <div class="copy">
        <div class="icon ico-tel"></div>
      </div>
      <div class="copy">
        <div class="icon ico-tel-black"></div>
      </div>
    </div>
    <h2>Icons size (sm, md, lg)</h2>
    <div class="copy">
      <div class="icon ico-tel sm"></div>
      <div class="icon ico-tel md"></div>
      <div class="icon ico-tel lg"></div>
      <div class="icon ico-tel xxl"></div>
    </div>
  </body>
</html>
